# ============================================================
# Decap CMS Configuration – New Fantasy
# Editable content: Daily lunch menu ONLY
# ============================================================

backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

site_url: https://new-fantasy.netlify.app

show_preview_links: false

logo_url: /assets/icons/favicon.svg

# ============================================================
# COLLECTIONS
# ============================================================
collections:
  - name: "menu"
    label: "Denní menu"
    label_singular: "Denní menu"
    files:
      - label: "Dnešní polední menu"
        name: "daily-menu"
        file: "content/menu.json"
        format: json
        editor:
          preview: false
        fields:

          # ── Date ──────────────────────────────────────────
          - label: "Datum"
            name: "date"
            widget: "datetime"
            format: "YYYY-MM-DD"
            date_format: "DD.MM.YYYY"
            time_format: false
            hint: "Datum, pro které platí toto menu"

          # ── Soups (up to 3) ───────────────────────────────
          - label: "Polévky"
            name: "soups"
            widget: "list"
            label_singular: "Polévka"
            min: 1
            max: 3
            fields:
              - label: "Název polévky"
                name: "name"
                widget: "string"
                hint: "Např. Hovězí vývar s nudlemi"
              - label: "Cena (Kč)"
                name: "price"
                widget: "number"
                value_type: "int"
                min: 1
                max: 999
              - label: "Alergeny"
                name: "allergens"
                widget: "string"
                required: false
                hint: "Čísla alergenů, např. 1, 3, 9"

          # ── Categories (named sections with items) ────────
          - label: "Kategorie jídel"
            name: "categories"
            widget: "list"
            label_singular: "Kategorie"
            min: 1
            max: 8
            hint: "Např. Hotová jídla, Asijské speciality, Mexické speciality, Oblíbené, Salát"
            fields:
              - label: "Název kategorie"
                name: "name"
                widget: "string"
                hint: "Např. Hotová jídla"
              - label: "Jídla v kategorii"
                name: "items"
                widget: "list"
                label_singular: "Jídlo"
                min: 1
                max: 10
                fields:
                  - label: "Název jídla"
                    name: "name"
                    widget: "string"
                    hint: "Např. Svíčková na smetaně"
                  - label: "Popis / příloha"
                    name: "description"
                    widget: "string"
                    required: false
                    hint: "Např. houskový knedlík, zeleninový salát"
                  - label: "Cena (Kč)"
                    name: "price"
                    widget: "number"
                    value_type: "int"
                    min: 1
                    max: 999
                  - label: "Alergeny"
                    name: "allergens"
                    widget: "string"
                    required: false
                    hint: "Např. 1, 3, 7"

          # ── Note ──────────────────────────────────────────
          - label: "Poznámka"
            name: "note"
            widget: "text"
            required: false
            hint: "Např. informace o ceně s polévkou, době podávání apod."
