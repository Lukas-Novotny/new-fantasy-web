# ============================================================
# netlify.toml – New Fantasy
# ============================================================

[build]
  publish = "."

# ─────────────────────────────────────────────────────────
# Security Headers
# ─────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options   = "nosniff"
    X-Frame-Options          = "DENY"
    X-XSS-Protection         = "1; mode=block"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "camera=(), microphone=(), geolocation=()"

# CMS admin can be framed by Netlify Identity only
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

# ─────────────────────────────────────────────────────────
# Cache Headers
# ─────────────────────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Menu is updated daily – short cache
[[headers]]
  for = "/content/menu.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# ─────────────────────────────────────────────────────────
# Redirects
# ─────────────────────────────────────────────────────────
[[redirects]]
  from  = "/admin"
  to    = "/admin/index.html"
  status = 200

# Future: redirect Netlify URL → custom domain once DNS is configured
